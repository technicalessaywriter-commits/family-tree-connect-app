services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/family_tree
      CLIENT_URL: http://localhost:5173
    ports:
      - "4000:4000"
    depends_on:
      - mongo

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api
        VITE_SOCKET_URL: http://localhost:4000
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  mongo-data:
